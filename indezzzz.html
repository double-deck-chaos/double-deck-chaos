<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wars Cards: Double Deck Chaos</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050510">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Double Deck">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3513/3513861.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --gold: #facc15;
            --pink: #ec4899;
            --cyan: #00ffcc;
            --red: #ef4444;
            --bg: #050510;
            --purple: #8b5cf6;
            --card-bg: rgba(255, 255, 255, 0.08);
            --joker: #a855f7;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            background: radial-gradient(circle at center, #1a0d2e 0%, var(--bg) 100%); 
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            height: 100vh; 
            overflow: hidden;
            position: relative;
        }

        /* MELHORIA VISUAL: CARTAS FLUTUANTES NO FUNDO */
        .bg-cards {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: -1; overflow: hidden; opacity: 0.3;
        }

        .floating-card {
            position: absolute; width: 60px; height: 90px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; animation: float linear infinite;
        }

        @keyframes float {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }

        /* ANIMAÇÕES */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px var(--gold); }
            to { text-shadow: 0 0 40px var(--gold), 0 0 60px var(--gold); }
        }

        /* MENU PRINCIPAL */
        .menu-container {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; padding: 20px; text-align: center;
            position: relative; z-index: 10;
        }

        h1 {
            color: var(--gold); font-size: clamp(2.2rem, 10vw, 4.5rem);
            text-shadow: 0 0 30px var(--gold); margin-bottom: 10px;
            animation: glow 2s ease-in-out infinite alternate;
            font-weight: 900; letter-spacing: -1px;
        }

        .tagline {
            margin-bottom: 50px; opacity: 0; font-size: 1.1rem; color: var(--cyan);
            animation: fadeInUp 0.8s ease forwards 0.2s;
            text-transform: uppercase; letter-spacing: 2px;
        }

        .game-btn {
            display: flex; align-items: center; justify-content: center; gap: 15px;
            width: 95%; max-width: 420px; margin: 12px 0;
            padding: 22px 30px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            color: white; font-size: 1.2rem; font-weight: 700;
            text-decoration: none; backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0; animation: fadeInUp 0.6s ease forwards;
        }

        .btn-1 { animation-delay: 0.4s; border-left: 6px solid var(--pink); }
        .btn-2 { animation-delay: 0.6s; border-left: 6px solid var(--cyan); }
        .btn-joker { animation-delay: 0.7s; border-left: 6px solid var(--joker); }
        .btn-3 { animation-delay: 0.8s; border-left: 6px solid var(--purple); }

        .game-btn:hover { 
            border-color: white; transform: translateY(-8px) scale(1.03);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .game-btn:active { transform: scale(0.96); }

        /* TELA AJUDA */
        #help-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top, #1a0d2e, var(--bg)); 
            z-index: 9999; display: none; flex-direction: column; align-items: center;
            overflow-y: auto; padding: 40px 20px;
        }

        .help-content { width: 100%; max-width: 600px; animation: fadeInUp 0.5s ease; }

        .mode-header {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 20px; font-weight: 800; border-radius: 12px;
            margin: 40px 0 20px 0; width: fit-content;
        }

        .rule-card {
            background: var(--card-bg); border-radius: 20px;
            padding: 24px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05);
        }

        .rule-card h3 { color: var(--gold); display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .rule-card p { color: #cbd5e1; line-height: 1.6; }

        .close-help-btn {
            background: var(--gold); color: black; border: none;
            width: 100%; padding: 20px; font-size: 1.2rem; font-weight: 800;
            border-radius: 18px; cursor: pointer; margin: 40px 0;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        hr { border: 0; border-top: 2px dashed rgba(255,255,255,0.1); margin: 50px 0; }
    </style>
</head>
<body>

    <div class="bg-cards" id="bgCards"></div>

    <div class="menu-container">
        <h1>Double Deck</h1>
        <p class="tagline">Independent Studio</p>
        
        <a href="ddc.html" class="game-btn btn-1">
            <i data-lucide="zap" style="color: var(--pink);"></i>
            DOUBLE DECK CHAOS
        </a>
        
        <a href="cmm.html" class="game-btn btn-2">
            <i data-lucide="refresh-cw" style="color: var(--cyan);"></i>
            CHAOS MONTE MANIA
        </a>

        <a href="CRJR.html" class="game-btn btn-joker">
            <i data-lucide="skull" style="color: var(--joker);"></i>
            CHAOS RUNNER: JR
        </a>
        
        <button class="game-btn btn-3" onclick="showHelp()">
            <i data-lucide="book-open"></i>
            COMO JOGAR
        </button>

        <p style="margin-top: 40px; font-size: 0.75rem; letter-spacing: 2px; opacity: 0.6; color: var(--gold); font-weight: bold;">
            DESENVOLVIDO POR: MARCOS ELIAS ANTUNES
        </p>
    </div>

    <div id="help-screen" onclick="handleOverlayClick(event)">
        <div class="help-content">
             <div style="text-align: center;">
                <i data-lucide="graduation-cap" size="48" style="color: var(--gold); margin-bottom: 15px;"></i>
                <h1>ACADEMIA DO CAOS</h1>
            </div>
            <button class="close-help-btn" onclick="hideHelp()">ENTENDIDO!</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Registro do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
            });
        }

        // Cartas flutuantes
        const bg = document.getElementById('bgCards');
        for(let i=0; i<15; i++) {
            const card = document.createElement('div');
            card.className = 'floating-card';
            card.style.left = Math.random() * 100 + 'vw';
            card.style.animationDuration = (Math.random() * 10 + 10) + 's';
            card.style.animationDelay = (Math.random() * 5) + 's';
            card.style.opacity = Math.random() * 0.5;
            bg.appendChild(card);
        }

        function showHelp() { document.getElementById('help-screen').style.display = 'flex'; }
        function hideHelp() { document.getElementById('help-screen').style.display = 'none'; }
        function handleOverlayClick(e) { if (e.target.id === 'help-screen') hideHelp(); }
    </script>
</body>
</html>
